name: Run Website Health Check
on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST (1:30 AM UTC)
    - cron: '30 13 * * *'  # 7:00 PM IST (1:30 PM UTC)

permissions:
  issues: write  # Required for creating GitHub Issues via the API

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Website Health Check Script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python "Website Health Check.py"
