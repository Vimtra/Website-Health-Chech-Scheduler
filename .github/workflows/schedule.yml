name: Run Website Health Check
on:
 schedule:
    - cron: '30 1 * * *'  # 7am IST (1:30am UTC)
    - cron: '30 13 * * *' # 7pm IST (1:30pm UTC)

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install jupyter nbconvert requests beautifulsoup4
      - name: Run notebook
        run: jupyter nbconvert --to notebook --execute "Website_Health_Check.ipynb"
